apiVersion: v1
kind: Namespace
metadata:
  name: buadmin

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: buadmin-cluster-read
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs:
    - get
    - list
    - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: buadmin-cluster-read-binding
subjects:
- kind: Group
  name: bu-admin-users
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: buadmin-cluster-read
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: buadmin-namespace-rw
  namespace: buadmin
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: buadmin-namespace-rw-binding
  namespace: buadmin
subjects:
- kind: Group
  name: bu-admin-users
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: buadmin-namespace-rw
  apiGroup: rbac.authorization.k8s.io
