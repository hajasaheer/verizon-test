apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-sre-rw
  namespace: APP_NAMESPACE
rules:
- apiGroups: ["", "apps", "batch"]
  resources:
  - pods
  - services
  - deployments
  - configmaps
  - secrets
  - daemonsets
  - statefulsets
  - jobs
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
