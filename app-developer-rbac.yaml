---
apiVersion: v1
kind: Namespace
metadata:
  name: dev

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-developers-readonly-binding
subjects:
- kind: Group
  name: app-developers
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: dev
  name: app-developer-dev-role

rules:

- apiGroups: [""]
  resources:
    - pods
    - services
    - configmaps
    - secrets
    - persistentvolumeclaims
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - statefulsets
    - daemonsets
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs:
    - create
    - delete
    - get
    - list

- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
  verbs:
    - create
    - update
    - delete
    - get
    - list

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-developer-dev-binding
  namespace: dev

subjects:
- kind: Group
  name: app-developers
  apiGroup: rbac.authorization.k8s.io

roleRef:
  kind: Role
  name: app-developer-dev-role
  apiGroup: rbac.authorization.k8s.io
